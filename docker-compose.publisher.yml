services:
  publisher:
    build:
      context: .
      dockerfile: ./publisher/Dockerfile
    container_name: radio-publisher
    restart: unless-stopped
    ports:
      - "${API_PORT}:${PUBLISHER_PORT}"
    environment:
      - LIQUIDSOAP_HOST=radio-liquidsoap
      - LIQUIDSOAP_TELNET_PORT=${LIQUIDSOAP_TELNET_PORT}
      - LIQUIDSOAP_HARBOUR_PORT=${LIQUIDSOAP_HARBOUR_PORT}
      - PORT=${PUBLISHER_PORT}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - DOWNLOADER_URL=http://radio-downloader:4002
    volumes:
      - radio-music:/app/music/songs
      - radio-interludios:/app/music/interludios
      - radio-publisher-data:/app/data
    networks:
      - radio-net

  downloader:
    build:
      context: ./downloader
      dockerfile: Dockerfile
    container_name: radio-downloader
    restart: unless-stopped
    environment:
      - PORT=4002
      - SONGS_DIR=/music/songs
    volumes:
      - radio-music:/music/songs
    networks:
      - radio-net

volumes:
  radio-music:
  radio-interludios:
  radio-publisher-data:

networks:
  radio-net:
