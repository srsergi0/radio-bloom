services:
  liquidsoap:
    image: savonet/liquidsoap:v2.2.5
    container_name: radio-liquidsoap
    restart: unless-stopped
    volumes:
      - ./liquidsoap/radio.liq:/etc/liquidsoap/radio.liq
      - ./music/songs:/music/songs
    command: /etc/liquidsoap/radio.liq
    networks:
      - radio-net

  publisher:
    build: ./publisher
    container_name: radio-publisher
    restart: unless-stopped
    depends_on:
      - liquidsoap
    ports:
      - "${API_PORT}:${PUBLISHER_PORT}"
    environment:
      - LIQUIDSOAP_HOST=${LIQUIDSOAP_HOST}
      - LIQUIDSOAP_TELNET_PORT=${LIQUIDSOAP_TELNET_PORT}
      - LIQUIDSOAP_HARBOUR_PORT=${LIQUIDSOAP_HARBOUR_PORT}
      - PORT=${PUBLISHER_PORT}
    volumes:
      - ./music:/app/music
      - ./publisher/data:/app/data
    networks:
      - radio-net

  ftp:
    image: stilliard/pure-ftpd:hardened
    container_name: radio-ftp
    restart: unless-stopped
    ports:
      - "${FTP_PORT}:21"
      - "${FTP_PASSIVE_MIN}-${FTP_PASSIVE_MAX}:${FTP_PASSIVE_MIN}-${FTP_PASSIVE_MAX}"
    volumes:
      - ./music/songs:/home/radio/music/songs
      - ./music/interludios:/home/radio/music/interludios
    environment:
      - PUBLICHOST=${FTP_PUBLIC_HOST}
      - FTP_USER_NAME=${FTP_USER_NAME}
      - FTP_USER_PASS=${FTP_USER_PASS}
      - FTP_USER_HOME=${FTP_USER_HOME}
      - UMASK=${FTP_UMASK}
      - TLS_CN=${FTP_PUBLIC_HOST}
    networks:
      - radio-net

networks:
  radio-net:
    driver: bridge
