services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["bun", "src/worker.ts"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DOWNLOAD_DIR=/app/downloads
    volumes:
      - downloads:/app/downloads
    depends_on:
      - redis

volumes:
  redis_data:
  downloads:
